<style>

    --text:#c8d2da;--muted:#7d8ea0;--dim:#4d5d6b;--blue:#5aa0d6;--steel:#9fb3c2;--snap:#7fd1b0;--ghost:#e0a458;--axis:#d6b25a;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--ground);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;touch-action:none}
  header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--hair);background:linear-gradient(180deg,#131c22,#0e1417);position:relative;z-index:5}
  .mark{font-weight:700;letter-spacing:.04em;font-size:14px}.mark b{color:var(--blue)}
  .vtog{display:flex;gap:5px;margin-left:8px}
  .vtog button{background:var(--panel2);border:1px solid var(--hair2);color:var(--muted);font:600 11.5px "Space Grotesk";padding:5px 12px;border-radius:6px;cursor:pointer}
  .vtog button.on{border-color:var(--blue);color:#dcefff;background:rgba(90,160,214,.12)}
  .reset{margin-left:auto;background:var(--panel2);border:1px solid var(--hair2);color:var(--text);font:500 12px "Space Grotesk";padding:6px 12px;border-radius:6px;cursor:pointer}
  .stage{position:absolute;inset:46px 0 0 0}
  #flat,#gl{position:absolute;inset:0}
  #flat{width:100%;height:100%;touch-action:none}#gl{display:none}
  .side{position:absolute;right:0;top:0;bottom:0;width:280px;background:rgba(20,29,35,.95);border-left:1px solid var(--hair);padding:15px;overflow-y:auto;z-index:4;backdrop-filter:blur(6px)}
  .grp{margin-bottom:14px}
  .grp h4{font:600 10px "IBM Plex Mono";letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;border-bottom:1px solid var(--hair);padding-bottom:4px}
  .step{font:12.5px "Space Grotesk";color:var(--muted);line-height:1.5;margin-bottom:9px}
  .btn{display:block;width:100%;text-align:center;padding:10px;border-radius:7px;font:600 12.5px "Space Grotesk";cursor:pointer;border:1px solid var(--hair2);background:var(--panel2);color:var(--text);margin-bottom:7px}
  .btn.go{background:linear-gradient(180deg,#1d4a6b,#163a55);border-color:#2f6c97;color:#dcefff}
  .btn.on{border-color:var(--snap);background:rgba(127,209,176,.12);color:#cdeee0}
  .btnrow{display:flex;gap:6px}.btnrow .btn{flex:1}
  .row{display:flex;align-items:center;justify-content:space-between;font-family:"IBM Plex Mono",monospace;font-size:12px;padding:5px 0}
  .row label{color:var(--muted)}.row .v{color:var(--steel)}
  input[type=range]{-webkit-appearance:none;width:120px;height:4px;background:var(--hair2);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--steel);cursor:pointer}
  .note{font:11px "IBM Plex Mono";color:var(--dim);line-height:1.55;margin-top:8px}
  .hint{position:absolute;left:14px;bottom:12px;font:11px "IBM Plex Mono";color:var(--dim);line-height:1.6;pointer-events:none;z-index:2}
</style>
</head>

      // close caps top/bottom across axis
      fx.strokeStyle=cssv('--snap');fx.lineWidth=2;fx.globalAlpha=.6;
      fx.beginPath();fx.moveTo(sp[0].x,sp[0].y);fx.lineTo(CX-profile[0].r*SCALE,FH-profile[0].y*SCALE);fx.stroke();
      const n=sp.length-1;fx.beginPath();fx.moveTo(sp[n].x,sp[n].y);fx.lineTo(CX-profile[n].r*SCALE,FH-profile[n].y*SCALE);fx.stroke();fx.globalAlpha=1;}
  }
}
function resample(p,n){if(p.length<2)return p.slice();let L=0;for(let i=1;i<p.length;i++)L+=Math.hypot(p[i].x-p[i-1].x,p[i].y-p[i-1].y);const st=L/(n-1);let o=[p[0]],d=0,i=1,pr=p[0];while(i<p.length){const s=Math.hypot(p[i].x-pr.x,p[i].y-pr.y);if(d+s>=st){const t=(st-d)/s,np={x:pr.x+(p[i].x-pr.x)*t,y:pr.y+(p[i].y-pr.y)*t};o.push(np);pr=np;d=0;}else{d+=s;pr=p[i];i++;}}while(o.length<n)o.push(p[p.length-1]);return o;}
function strokeToProfile(s){const rs=resample(s,48);let prof=rs.map(p=>({r:Math.max(0.02,Math.abs(p.x-CX)/SCALE),y:(FH-p.y)/SCALE}));
  // order bottom->top by y
  prof.sort((a,b)=>a.y-b.y);return prof;}
fc.addEventListener('pointerdown',e=>{if(view!=='flat')return;fc.setPointerCapture(e.pointerId);raw=[{x:e.offsetX,y:e.offsetY}];});
fc.addEventListener('pointermove',e=>{if(raw){raw.push({x:e.offsetX,y:e.offsetY});drawFlat();}});
fc.addEventListener('pointerup',()=>{if(raw&&raw.length>4){profile=strokeToProfile(raw);}raw=null;drawFlat();renderSide();});

// ---------- 3D ----------
let scene,cam,rndr,glEl,target,azim=-0.7,elev=0.3,rad=4,mesh;
function init3D(){
  glEl=document.getElementById('gl');
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0b1013);
  cam=new THREE.PerspectiveCamera(45,1,0.1,100);target=new THREE.Vector3(0,1,0);
  rndr=new THREE.WebGLRenderer({antialias:true});glEl.appendChild(rndr.domElement);
  scene.add(new THREE.HemisphereLight(0xbcd2e0,0x101820,0.95));
  const d=new THREE.DirectionalLight(0xffffff,0.9);d.position.set(4,8,5);scene.add(d);
  const d2=new THREE.DirectionalLight(0x88aacc,0.4);d2.position.set(-5,-2,-4);scene.add(d2);
  scene.add(new THREE.GridHelper(8,8,0x27343f,0x162029));
  animate3D();
  let dr=false,px,py;
  glEl.addEventListener('pointerdown',e=>{dr=true;px=e.clientX;py=e.clientY;});
  window.addEventListener('pointermove',e=>{if(!dr||view!=='3d')return;azim-=(e.clientX-px)*0.008;elev=Math.max(-1.3,Math.min(1.4,elev+(e.clientY-py)*0.008));px=e.clientX;py=e.clientY;});
  window.addEventListener('pointerup',()=>dr=false);
  glEl.addEventListener('wheel',e=>{if(view!=='3d')return;e.preventDefault();rad=Math.max(1.5,Math.min(20,rad*Math.exp(e.deltaY*0.0012)));},{passive:false});
}
function resize3D(){if(!rndr)return;const w=glEl.clientWidth,h=glEl.clientHeight;cam.aspect=w/h;cam.updateProjectionMatrix();rndr.setPixelRatio(Math.min(devicePixelRatio,2));rndr.setSize(w,h);}
function animate3D(){requestAnimationFrame(animate3D);if(view!=='3d')return;cam.position.set(target.x+rad*Math.cos(elev)*Math.sin(azim),target.y+rad*Math.sin(elev),target.z+rad*Math.cos(elev)*Math.cos(azim));cam.lookAt(target);rndr.render(scene,cam);}
function buildRevolve(){
  if(mesh){mesh.geometry.dispose();scene.remove(mesh);mesh=null;}
  if(!profile)return;
  let pts=profile.map(p=>({r:p.r,y:p.y}));
  if(!shell){pts=[{r:0.001,y:pts[0].y}].concat(pts).concat([{r:0.001,y:pts[pts.length-1].y}]);}
  const N=segs,pos=[],idx=[],P=pts.length;
  for(let j=0;j<P;j++)for(let s=0;s<=N;s++){const a=s/N*Math.PI*2;pos.push(pts[j].r*Math.cos(a),pts[j].y,pts[j].r*Math.sin(a));}
  for(let j=0;j<P-1;j++)for(let s=0;s<N;s++){const a=j*(N+1)+s,b=j*(N+1)+s+1,c=(j+1)*(N+1)+s+1,d=(j+1)*(N+1)+s;idx.push(a,b,c,a,c,d);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));g.setIndex(idx);g.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({color:0x7f9fb5,metalness:0.4,roughness:0.45,side:shell?THREE.DoubleSide:THREE.FrontSide});
  mesh=new THREE.Mesh(g,mat);scene.add(mesh);
  const ymax=Math.max(...pts.map(p=>p.y)),ymin=Math.min(...pts.map(p=>p.y));target.set(0,(ymax+ymin)/2,0);rad=Math.max(3,(ymax-ymin)*2.2+1);
}

// ---------- views ----------
function setView(v){view=v;
  document.getElementById('vFlat').classList.toggle('on',v==='flat');
  document.getElementById('v3d').classList.toggle('on',v==='3d');
  fc.style.display=v==='flat'?'block':'none';
  glEl.style.display=v==='3d'?'block':'none';
  document.getElementById('hint').style.display=v==='flat'?'block':'none';
  if(v==='3d'){if(!rndr)init3D();resize3D();buildRevolve();}
  if(v==='flat')drawFlat();
  renderSide();
}
function renderSide(){
  const s=document.getElementById('side');let h='';
  if(view==='flat'){
    h+=`<div class="grp"><h4>catalogued part</h4>`;
    h+=`<select id="partSel" style="width:100%;background:var(--panel2);border:1px solid var(--hair2);color:var(--text);font:500 12px 'Space Grotesk';padding:8px;border-radius:6px;margin-bottom:7px">`;
    h+=`<option value="">— load a real part —</option>`+Object.keys(PARTLIB).map(k=>`<option value="${k}"${k===loadedPart?' selected':''}>${k.replace(/_/g,' ')}</option>`).join('')+`</select>`;
    if(loadedPart){const P=PARTLIB[loadedPart];h+=`<div class="note">${loadedPart.replace(/_/g,' ')} — ${P.function||''}${P.dims_mm?` · OD ${P.dims_mm.outer_mm} mm`:''}${P.shell?' · hollow (shell)':''}</div>`;}
    else{h+=`<div class="note">pull a real catalogued part — its true dimensions become the half-profile; revolve it to build the part.</div>`;}
    h+=`</div>`;
    h+=`<div class="grp"><h4>draw half · close it</h4>`;
    h+=`<div class="step">${profile?'Your half-profile is the blue curve. The teal is the mirror — that\'s the closure completing it.':'Draw half the silhouette on one side of the gold datum axis, bottom to top.'}</div>`;
    h+=`<button class="btn ${mirror?'on':''}" id="aMirror">${mirror?'mirror: showing close':'mirror: off'}</button>`;
    h+=`</div>`;
    if(profile){h+=`<div class="grp"><h4>revolve</h4>
      <div class="btnrow"><button class="btn ${shell?'on':''}" id="aShell">shell</button><button class="btn ${!shell?'on':''}" id="aSolid">solid</button></div>
      <button class="btn go" id="aRev">revolve → 3D</button>
      <div class="note">shell = a hollow wall you can work inside · solid = filled. revolving the half closes it around the datum.</div></div>`;}
  } else {
    h+=`<div class="grp"><h4>revolved ${shell?'shell':'solid'}</h4>
      <div class="step">${shell?'A shell — orbit inside it to work in context.':'A filled solid of revolution.'}</div>
      <div class="btnrow"><button class="btn ${shell?'on':''}" id="aShell">shell</button><button class="btn ${!shell?'on':''}" id="aSolid">solid</button></div>
      <div class="row"><label>segments</label><input type="range" id="segR" min="6" max="64" value="${segs}"><span class="v" id="vseg">${segs}</span></div>
      <button class="btn" id="aBack">← edit the profile</button></div>`;
    h+=`<div class="note">drag to orbit (and dive inside a shell) · scroll to zoom. one half-sketch → a whole turned part.</div>`;
  }
  s.innerHTML=h;
  const on=(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};
  on('aMirror',()=>{mirror=!mirror;drawFlat();renderSide();});
  on('aShell',()=>{shell=true;if(view==='3d')buildRevolve();drawFlat();renderSide();});
  on('aSolid',()=>{shell=false;if(view==='3d')buildRevolve();drawFlat();renderSide();});
  on('aRev',()=>setView('3d'));
  on('aBack',()=>setView('flat'));
  const psel=document.getElementById('partSel');
  if(psel)psel.onchange=e=>{const k=e.target.value;if(!k)return;const P=PARTLIB[k];profile=P.profile.map(p=>({r:p.r,y:p.y}));shell=!!P.shell;mirror=true;loadedPart=k;raw=null;if(view==='3d')buildRevolve();drawFlat();renderSide();};
  const seg=document.getElementById('segR');if(seg)seg.oninput=e=>{segs=+e.target.value;document.getElementById('vseg').textContent=segs;buildRevolve();};
}
document.getElementById('vFlat').onclick=()=>setView('flat');
document.getElementById('v3d').onclick=()=>{if(profile)setView('3d');};
document.getElementById('reset').onclick=()=>{raw=null;profile=null;if(mesh){mesh.geometry.dispose();scene&&scene.remove(mesh);mesh=null;}setView('flat');drawFlat();renderSide();};
window.addEventListener('resize',()=>{fitFlat();resize3D();});
fitFlat();renderSide();
</script>
</body>
</html>
