<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>EoE — Substrate on a Sphere</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05070d;font-family:system-ui,sans-serif;color:#cdd9ef;}
  #c{display:block;width:100vw;height:100vh;}
  #panel{position:fixed;top:14px;left:14px;width:248px;background:rgba(9,12,20,0.92);
    border:1px solid rgba(212,160,73,0.35);border-radius:14px;padding:14px 16px;backdrop-filter:blur(6px);}
  #panel h1{font:600 17px Georgia,serif;margin:0 0 2px;color:#e7eefc;}
  #panel .sub{font-size:11px;color:#5f7299;line-height:1.5;margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#9fb3d6;}
  .row input[type=range]{flex:1;accent-color:#ecb74e;}
  .row .v{width:40px;text-align:right;color:#ecb74e;font-variant-numeric:tabular-nums;}
  .btns{display:flex;gap:8px;margin-top:12px;}
  button{flex:1;background:#11182a;color:#cdd9ef;border:1px solid rgba(160,180,210,0.2);
    border-radius:9px;padding:9px 6px;font:500 13px system-ui;cursor:pointer;}
  button:hover{border-color:rgba(236,183,78,0.8);color:#ffe2a6;}
  #vr{background:#1c2c1e;border-color:rgba(126,178,127,0.5);color:#bfe6c0;}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:12px;color:#5f7299;
    background:rgba(9,12,20,0.7);padding:6px 16px;border-radius:20px;}
  .m{font-size:11px;color:#7f8db0;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>Substrate on a Sphere</h1>
  <div class="sub">M = χs − λ running directly on a geodesic surface. No grid, no projection, no poles — the field is a function of direction itself.</div>
  <div class="row"><span style="width:34px">feed</span><input id="feed" type="range" min="0.010" max="0.090" step="0.001" value="0.037"><span class="v" id="feedv">0.037</span></div>
  <div class="row"><span style="width:34px">kill</span><input id="kill" type="range" min="0.045" max="0.075" step="0.001" value="0.065"><span class="v" id="killv">0.065</span></div>
  <div class="row"><span style="width:34px">relief</span><input id="disp" type="range" min="0" max="1.2" step="0.02" value="0.55"><span class="v" id="dispv">0.55</span></div>
  <div class="row"><span style="width:34px">flow</span><input id="rate" type="range" min="2" max="22" step="1" value="12"><span class="v" id="ratev">12</span></div>
  <div class="btns">
    <button id="seed">Reseed</button>
    <button id="vr">Enter VR</button>
  </div>
  <div class="m" id="stat">vertices: —</div>
</div>
<div id="hint">drag to orbit · scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const cvs=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas:cvs,antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(2,devicePixelRatio));
renderer.xr.enabled=true; renderer.setClearColor(0x05070d,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.01,100);
const rig=new THREE.Group(); rig.add(camera); scene.add(rig);

// ---- starfield ambiance ----
(function(){
  const g=new THREE.BufferGeometry(); const N=1200; const p=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const r=18+Math.random()*22, th=Math.acos(2*Math.random()-1), ph=Math.random()*6.283;
    p[i*3]=r*Math.sin(th)*Math.cos(ph); p[i*3+1]=r*Math.cos(th); p[i*3+2]=r*Math.sin(th)*Math.sin(ph); }
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x4a90d4,size:0.06,transparent:true,opacity:0.6})));
})();

// ---- geodesic sphere (subdivided icosahedron) + adjacency ----
function icosphere(order){
  const t=(1+Math.sqrt(5))/2;
  let V=[[-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],[0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],[t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1]]
    .map(v=>{const l=Math.hypot(v[0],v[1],v[2]);return [v[0]/l,v[1]/l,v[2]/l];});
  let F=[[0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],[1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
         [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],[4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]];
  const mid=new Map();
  function mp(a,b){ const key=a<b?a*1e6+b:b*1e6+a; if(mid.has(key))return mid.get(key);
    const va=V[a],vb=V[b]; let m=[(va[0]+vb[0])/2,(va[1]+vb[1])/2,(va[2]+vb[2])/2];
    const l=Math.hypot(m[0],m[1],m[2]); m=[m[0]/l,m[1]/l,m[2]/l]; const i=V.length; V.push(m); mid.set(key,i); return i; }
  for(let s=0;s<order;s++){ const nf=[]; for(const f of F){ const a=mp(f[0],f[1]),b=mp(f[1],f[2]),c=mp(f[2],f[0]);
    nf.push([f[0],a,c],[f[1],b,a],[f[2],c,b],[a,b,c]); } F=nf; }
  const adj=V.map(()=>new Set());
  for(const f of F){ adj[f[0]].add(f[1]);adj[f[0]].add(f[2]); adj[f[1]].add(f[0]);adj[f[1]].add(f[2]); adj[f[2]].add(f[0]);adj[f[2]].add(f[1]); }
  return {V,F,nbr:adj.map(s=>Array.from(s))};
}

const ICO=icosphere(5);                 // 10242 vertices
const n=ICO.V.length;
document.getElementById('stat').textContent='vertices: '+n.toLocaleString()+'  ·  faces: '+ICO.F.length.toLocaleString();

// flatten geometry
const pos=new Float32Array(n*3);
for(let i=0;i<n;i++){ pos[i*3]=ICO.V[i][0]; pos[i*3+1]=ICO.V[i][1]; pos[i*3+2]=ICO.V[i][2]; }
const idx=new Uint32Array(ICO.F.length*3);
for(let i=0;i<ICO.F.length;i++){ idx[i*3]=ICO.F[i][0]; idx[i*3+1]=ICO.F[i][1]; idx[i*3+2]=ICO.F[i][2]; }
// neighbor list as flat arrays for speed
const nbrFlat=[], nbrStart=new Int32Array(n+1);
for(let i=0;i<n;i++){ nbrStart[i]=nbrFlat.length; for(const j of ICO.nbr[i]) nbrFlat.push(j); }
nbrStart[n]=nbrFlat.length;
const NB=Int32Array.from(nbrFlat);

// ---- reaction-diffusion state (Gray-Scott on the geodesic neighbour graph) ----
const U=new Float32Array(n), Vv=new Float32Array(n), U2=new Float32Array(n), V2=new Float32Array(n);
const aField=new Float32Array(n);   // what the shader reads (the V / order field)
let FEED=0.037, KILL=0.065, RATE=12, DISP=0.55;
const Du=1.0, Dv=0.5, DT=1.0;   // canonical Gray-Scott: with the normalised neighbour-average Laplacian this is the standard, stable, pattern-forming setup

function reseed(){
  U.fill(1.0); Vv.fill(0.0);
  for(let s=0;s<30;s++){                 // bigger ignition blobs (3 neighbour-rings) so they survive diffusion and grow coral-style
    const c=(Math.random()*n)|0; const ring=new Set([c]);
    for(let r=0;r<3;r++){ const cur=Array.from(ring); for(const x of cur){ for(let k=nbrStart[x];k<nbrStart[x+1];k++) ring.add(NB[k]); } }
    for(const j of ring){ Vv[j]=0.5; U[j]=0.3; }
  }
}
reseed();

function stepRD(){
  const lam=FEED+KILL;
  for(let s=0;s<RATE;s++){
    for(let i=0;i<n;i++){
      let su=0,sv=0; const a=nbrStart[i], b=nbrStart[i+1]; const d=b-a;
      for(let k=a;k<b;k++){ const j=NB[k]; su+=U[j]; sv+=Vv[j]; }
      const u=U[i], v=Vv[i];
      const lapU=su/d-u, lapV=sv/d-v;
      const uvv=u*v*v;
      U2[i]=Math.min(1.2,Math.max(0.0, u+(Du*lapU - uvv + FEED*(1.0-u))*DT));
      V2[i]=Math.min(1.2,Math.max(0.0, v+(Dv*lapV + uvv - lam*v)*DT));
    }
    U.set(U2); Vv.set(V2);
  }
  const fa=fieldAttr.array; for(let i=0;i<n;i++) fa[i]=Vv[i];   // write into the attribute's OWN buffer (it copied aField at construction)
  fieldAttr.needsUpdate=true;
}

// ---- geometry + shader (field IS a function of the surface point: coordinate-free, seamless) ----
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
const fieldAttr=new THREE.Float32BufferAttribute(aField,1); fieldAttr.setUsage(THREE.DynamicDrawUsage);
geo.setAttribute('aField',fieldAttr);
geo.setIndex(new THREE.Uint32BufferAttribute(idx,1));

const mat=new THREE.ShaderMaterial({
  uniforms:{ uDisp:{value:DISP}, uChi:{value:1.0}, uLam:{value:FEED+KILL} },
  extensions:{derivatives:true},
  vertexShader:`
    attribute float aField; uniform float uDisp;
    varying float vF; varying vec3 vVP;
    void main(){ vF=aField;
      vec3 p=position*(1.0 + uDisp*aField);          // displace radially by the field -> relief, no projection
      vec4 mv=modelViewMatrix*vec4(p,1.0); vVP=mv.xyz;
      gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`
    precision highp float;
    varying float vF; varying vec3 vVP; uniform float uChi; uniform float uLam;
    void main(){
      vec3 N=normalize(cross(dFdx(vVP),dFdy(vVP)));   // true geometric normal of the relief -> 3D shading of the pores
      vec3 V=normalize(-vVP); if(dot(N,V)<0.0) N=-N;
      float lit=0.32+0.68*clamp(dot(N,normalize(vec3(0.4,0.62,0.68))),0.0,1.0);
      float fres=pow(1.0-clamp(dot(N,V),0.0,1.0),2.0);
      float M=uChi*vF-uLam;                            // colour IS the engine quantity M = chi*s - lambda
      float Mn=clamp(M*2.5+0.12,0.0,1.0);              // normalised across the field's range
      vec3 ramp=mix(vec3(46.0,116.0,173.0)/255.0, vec3(236.0,183.0,78.0)/255.0, Mn);
      vec3 col=ramp*(0.30+0.92*lit)+ramp*fres*0.45;
      gl_FragColor=vec4(col,1.0); }`,
  side:THREE.DoubleSide
});

const cellGroup=new THREE.Group(); scene.add(cellGroup);
const mesh=new THREE.Mesh(geo,mat); cellGroup.add(mesh);

// ---- placement: desktop vs VR ----
function placeDesktop(){ cellGroup.position.set(0,0,0); cellGroup.scale.setScalar(1); }
function placeVR(){ cellGroup.position.set(0,1.45,-1.1); cellGroup.scale.setScalar(0.55); }
placeDesktop();
camera.position.set(0,0,3.0);

// ---- desktop orbit / zoom (rotate the cell group; rig stays put) ----
let dragging=false, px=0, py=0, yaw=0, pitch=0.2, dist=3.0;
cvs.addEventListener('pointerdown',e=>{ if(renderer.xr.isPresenting)return; dragging=true; px=e.clientX; py=e.clientY; });
addEventListener('pointermove',e=>{ if(!dragging)return; yaw+=(e.clientX-px)*0.006; pitch+=(e.clientY-py)*0.006;
  pitch=Math.max(-1.4,Math.min(1.4,pitch)); px=e.clientX; py=e.clientY; });
addEventListener('pointerup',()=>dragging=false);
cvs.addEventListener('wheel',e=>{ if(renderer.xr.isPresenting)return; dist=Math.max(1.4,Math.min(8,dist+e.deltaY*0.003)); },{passive:true});

// ---- controls ----
const $=id=>document.getElementById(id);
function bind(id,vid,fn,fmt){ const el=$(id); el.addEventListener('input',()=>{ const v=parseFloat(el.value); $(vid).textContent=fmt?fmt(v):v; fn(v); }); }
bind('feed','feedv',v=>{FEED=v; mat.uniforms.uLam.value=FEED+KILL;}, v=>v.toFixed(3));
bind('kill','killv',v=>{KILL=v; mat.uniforms.uLam.value=FEED+KILL;}, v=>v.toFixed(3));
bind('disp','dispv',v=>{DISP=v; mat.uniforms.uDisp.value=v;}, v=>v.toFixed(2));
bind('rate','ratev',v=>{RATE=v|0;}, v=>String(v|0));
$('seed').onclick=reseed;

// ---- WebXR ----
let xrSession=null;
const vrBtn=$('vr');
if(navigator.xr){ navigator.xr.isSessionSupported('immersive-vr').then(ok=>{ if(!ok) vrBtn.textContent='VR not available'; }); }
else vrBtn.textContent='No WebXR';
vrBtn.onclick=async()=>{
  if(xrSession){ xrSession.end(); return; }
  try{
    const session=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']});
    renderer.xr.setReferenceSpaceType('local-floor'); await renderer.xr.setSession(session);
    xrSession=session; vrBtn.textContent='Exit VR'; placeVR();
    session.addEventListener('end',()=>{ xrSession=null; vrBtn.textContent='Enter VR'; placeDesktop(); });
  }catch(e){ vrBtn.textContent='VR failed'; }
};

// ---- loop ----
const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  stepRD();
  if(!renderer.xr.isPresenting){
    const cp=Math.cos(pitch);
    camera.position.set(Math.sin(yaw)*cp*dist, Math.sin(pitch)*dist, Math.cos(yaw)*cp*dist);
    camera.lookAt(0,0,0);
  }
  cellGroup.rotation.y += clock.getDelta()*0.05;   // slow idle spin so you see it's a full sphere
  renderer.render(scene,camera);
});

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
