<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>EoE — A Cell with Depth</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05070d;font-family:system-ui,sans-serif;color:#cdd9ef;}
  #c{display:block;width:100vw;height:100vh;}
  #panel{position:fixed;top:14px;left:14px;width:252px;background:rgba(9,12,20,0.92);
    border:1px solid rgba(212,160,73,0.35);border-radius:14px;padding:14px 16px;backdrop-filter:blur(6px);}
  #panel h1{font:600 17px Georgia,serif;margin:0 0 2px;color:#e7eefc;}
  #panel .sub{font-size:11px;color:#5f7299;line-height:1.5;margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#9fb3d6;}
  .row input[type=range]{flex:1;accent-color:#ecb74e;}
  .row .v{width:42px;text-align:right;color:#ecb74e;font-variant-numeric:tabular-nums;}
  .btns{display:flex;gap:8px;margin-top:12px;}
  button{flex:1;background:#11182a;color:#cdd9ef;border:1px solid rgba(160,180,210,0.2);
    border-radius:9px;padding:9px 6px;font:500 13px system-ui;cursor:pointer;}
  button:hover{border-color:rgba(236,183,78,0.8);color:#ffe2a6;}
  #vr{background:#1c2c1e;border-color:rgba(126,178,127,0.5);color:#bfe6c0;}
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:12px;color:#5f7299;
    background:rgba(9,12,20,0.7);padding:6px 16px;border-radius:20px;}
  .m{font-size:11px;color:#7f8db0;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>A Cell with Depth</h1>
  <div class="sub">M = χs − λ running through the <i>volume</i> — concentric compression layers, denser and more strained inward. Structure builds in the interior; the boundary expands.</div>
  <div class="row"><span style="width:54px">feed</span><input id="feed" type="range" min="0.010" max="0.090" step="0.001" value="0.037"><span class="v" id="feedv">0.037</span></div>
  <div class="row"><span style="width:54px">kill</span><input id="kill" type="range" min="0.045" max="0.075" step="0.001" value="0.062"><span class="v" id="killv">0.062</span></div>
  <div class="row"><span style="width:54px">compress</span><input id="comp" type="range" min="0" max="1.6" step="0.05" value="0.9"><span class="v" id="compv">0.9</span></div>
  <div class="row"><span style="width:54px">expand</span><input id="exp" type="range" min="0" max="0.06" step="0.002" value="0.006"><span class="v" id="expv">0.006</span></div>
  <div class="row"><span style="width:54px">flow</span><input id="rate" type="range" min="1" max="16" step="1" value="6"><span class="v" id="ratev">6</span></div>
  <div class="btns">
    <button id="seed">Reseed</button>
    <button id="vr">Enter VR</button>
  </div>
  <div class="m" id="stat">—</div>
</div>
<div id="hint">drag to orbit · scroll to zoom · expand to fall inside</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const cvs=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas:cvs,antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(2,devicePixelRatio));
renderer.xr.enabled=true; renderer.setClearColor(0x05070d,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.01,300);
const rig=new THREE.Group(); rig.add(camera); scene.add(rig);

// ---- starfield ambiance (pushed out so it stays outside as the cell inflates) ----
(function(){
  const g=new THREE.BufferGeometry(); const N=1200; const p=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const r=30+Math.random()*50, th=Math.acos(2*Math.random()-1), ph=Math.random()*6.283;
    p[i*3]=r*Math.sin(th)*Math.cos(ph); p[i*3+1]=r*Math.cos(th); p[i*3+2]=r*Math.sin(th)*Math.sin(ph); }
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x4a90d4,size:0.10,transparent:true,opacity:0.55})));
})();

// ---- geodesic direction-set (subdivided icosahedron) + adjacency ----
function icosphere(order){
  const t=(1+Math.sqrt(5))/2;
  let V=[[-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],[0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],[t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1]]
    .map(v=>{const l=Math.hypot(v[0],v[1],v[2]);return [v[0]/l,v[1]/l,v[2]/l];});
  let F=[[0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],[1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
         [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],[4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]];
  const mid=new Map();
  function mp(a,b){ const key=a<b?a*1e6+b:b*1e6+a; if(mid.has(key))return mid.get(key);
    const va=V[a],vb=V[b]; let m=[(va[0]+vb[0])/2,(va[1]+vb[1])/2,(va[2]+vb[2])/2];
    const l=Math.hypot(m[0],m[1],m[2]); m=[m[0]/l,m[1]/l,m[2]/l]; const i=V.length; V.push(m); mid.set(key,i); return i; }
  for(let s=0;s<order;s++){ const nf=[]; for(const f of F){ const a=mp(f[0],f[1]),b=mp(f[1],f[2]),c=mp(f[2],f[0]);
    nf.push([f[0],a,c],[f[1],b,a],[f[2],c,b],[a,b,c]); } F=nf; }
  const adj=V.map(()=>new Set());
  for(const f of F){ adj[f[0]].add(f[1]);adj[f[0]].add(f[2]); adj[f[1]].add(f[0]);adj[f[1]].add(f[2]); adj[f[2]].add(f[0]);adj[f[2]].add(f[1]); }
  return {V,nbr:adj.map(s=>Array.from(s))};
}

const ICO=icosphere(4);                 // 2562 directions  (the "grid" is the direction-set itself)
const DIR=ICO.V;
const NDIR=DIR.length;
const LAYERS=18;                         // concentric compression layers (radial axis)
const NTOT=NDIR*LAYERS;

// flatten the single-shell adjacency once; every layer shares it
const nbrFlat=[], nbrStart=new Int32Array(NDIR+1);
for(let i=0;i<NDIR;i++){ nbrStart[i]=nbrFlat.length; for(const j of ICO.nbr[i]) nbrFlat.push(j); }
nbrStart[NDIR]=nbrFlat.length;
const NB=Int32Array.from(nbrFlat);

// ---- per-layer radial structure: radius, compression, susceptibility χ ----
const R0=0.18;
const rad=new Float32Array(LAYERS), comp=new Float32Array(LAYERS), invComp=new Float32Array(LAYERS), chi=new Float32Array(LAYERS);
let compStrength=0.9;
function recomputeLayers(){
  for(let l=0;l<LAYERS;l++){
    const rn=LAYERS>1? l/(LAYERS-1):0;          // 0 = innermost (most compressed) .. 1 = boundary
    rad[l]=R0+(1-R0)*rn;
    comp[l]=1+compStrength*(1-rn);              // held tighter than natural spacing toward the core
    invComp[l]=1/comp[l];                        // lower diffusion inward -> finer, denser features
    chi[l]=comp[l];                              // higher χ inward -> higher M -> richer structure (colour IS M)
  }
}
recomputeLayers();

// ---- reaction-diffusion state over the whole volume ----
const U=new Float32Array(NTOT), Vv=new Float32Array(NTOT), U2=new Float32Array(NTOT), V2=new Float32Array(NTOT);
let FEED=0.037, KILL=0.062, RATE=6;
const Du=1.0, Dv=0.5, DT=1.0;

function reseed(){
  U.fill(1.0); Vv.fill(0.0);
  for(let s=0;s<48;s++){
    const l0=(Math.random()*LAYERS)|0, i0=(Math.random()*NDIR)|0;
    const ring=new Set([i0]);
    for(let r=0;r<2;r++){ const cur=Array.from(ring); for(const x of cur){ for(let k=nbrStart[x];k<nbrStart[x+1];k++) ring.add(NB[k]); } }
    for(let dl=-1;dl<=1;dl++){ const l=l0+dl; if(l<0||l>=LAYERS)continue; const base=l*NDIR;
      for(const j of ring){ Vv[base+j]=0.5; U[base+j]=0.3; } }
  }
  Rscale=1.0;
}

function stepRD(){
  const lam=FEED+KILL;
  for(let s=0;s<RATE;s++){
    for(let l=0;l<LAYERS;l++){
      const base=l*NDIR, dU=Du*invComp[l], dV=Dv*invComp[l];
      const hasDown=l>0, hasUp=l<LAYERS-1, baseDown=base-NDIR, baseUp=base+NDIR;
      for(let i=0;i<NDIR;i++){
        const ci=base+i; let su=0,sv=0,cnt=0;
        for(let k=nbrStart[i];k<nbrStart[i+1];k++){ const j=base+NB[k]; su+=U[j]; sv+=Vv[j]; cnt++; }   // within-shell neighbours
        if(hasDown){ const j=baseDown+i; su+=U[j]; sv+=Vv[j]; cnt++; }                                   // radial coupling: inward
        if(hasUp){ const j=baseUp+i; su+=U[j]; sv+=Vv[j]; cnt++; }                                       // radial coupling: outward
        const u=U[ci], v=Vv[ci];
        const lapU=su/cnt-u, lapV=sv/cnt-v, uvv=u*v*v;
        U2[ci]=Math.min(1.2,Math.max(0.0, u+(dU*lapU - uvv + FEED*(1.0-u))*DT));
        V2[ci]=Math.min(1.2,Math.max(0.0, v+(dV*lapV + uvv - lam*v)*DT));
      }
    }
    U.set(U2); Vv.set(V2);
  }
  // write the engine readout into the GPU buffers (write into the attribute's OWN array)
  const am=mAttr.array, av=vAttr.array;
  for(let l=0;l<LAYERS;l++){ const base=l*NDIR, c=chi[l];
    for(let i=0;i<NDIR;i++){ const ci=base+i, v=Vv[ci]; am[ci]=c*v-lam; av[ci]=v; } }
  mAttr.needsUpdate=true; vAttr.needsUpdate=true;
}

// ---- volume render: one point per cell, colour = M, opacity/size = structure, additive glow so you see in ----
const positions=new Float32Array(NTOT*3);
for(let l=0;l<LAYERS;l++){ const base=l*NDIR, rr=rad[l];
  for(let i=0;i<NDIR;i++){ const ci=(base+i)*3; positions[ci]=DIR[i][0]*rr; positions[ci+1]=DIR[i][1]*rr; positions[ci+2]=DIR[i][2]*rr; } }

const aM=new Float32Array(NTOT), aV=new Float32Array(NTOT);
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
const mAttr=new THREE.Float32BufferAttribute(aM,1); mAttr.setUsage(THREE.DynamicDrawUsage); geo.setAttribute('aM',mAttr);
const vAttr=new THREE.Float32BufferAttribute(aV,1); vAttr.setUsage(THREE.DynamicDrawUsage); geo.setAttribute('aV',vAttr);

const mat=new THREE.ShaderMaterial({
  uniforms:{ uFocal:{value:innerHeight*Math.min(2,devicePixelRatio)*0.55}, uSizeGain:{value:0.045}, uAlpha:{value:1.9} },
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false,
  vertexShader:`
    attribute float aM; attribute float aV;
    uniform float uFocal; uniform float uSizeGain;
    varying float vM; varying float vV;
    void main(){ vM=aM; vV=aV;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      float sz=0.012+uSizeGain*aV;                       // structure points grow; empty substrate stays tiny
      gl_PointSize=clamp(sz*uFocal/max(0.05,-mv.z),1.0,42.0);
      gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`
    precision highp float;
    varying float vM; varying float vV; uniform float uAlpha;
    void main(){
      vec2 d=gl_PointCoord-vec2(0.5); float r2=dot(d,d); if(r2>0.25) discard;
      float soft=smoothstep(0.25,0.0,r2);
      float Mn=clamp(vM*2.5+0.12,0.0,1.0);
      vec3 ramp=mix(vec3(46.0,116.0,173.0)/255.0, vec3(236.0,183.0,78.0)/255.0, Mn);   // colour IS M = χs − λ
      float a=clamp(vV*uAlpha,0.0,1.0)*soft;             // empty substrate -> invisible -> interior shows through
      gl_FragColor=vec4(ramp,a); }`
});

const cellGroup=new THREE.Group(); scene.add(cellGroup);
cellGroup.add(new THREE.Points(geo,mat));

document.getElementById('stat').textContent=
  NDIR.toLocaleString()+' directions × '+LAYERS+' layers = '+NTOT.toLocaleString()+' cells';

reseed();

// ---- placement: desktop vs VR ----
let placeScale=1.0, Rscale=1.0;
function placeDesktop(){ cellGroup.position.set(0,0,0); placeScale=1.0; }
function placeVR(){ cellGroup.position.set(0,1.35,-0.3); placeScale=2.2; }   // start enveloping the viewer
placeDesktop();
camera.position.set(0,0,2.7);

// ---- desktop orbit / zoom (rotate the cell group; rig stays put) ----
let dragging=false, px=0, py=0, yaw=0, pitch=0.2, dist=2.7;
cvs.addEventListener('pointerdown',e=>{ if(renderer.xr.isPresenting)return; dragging=true; px=e.clientX; py=e.clientY; });
addEventListener('pointermove',e=>{ if(!dragging)return; yaw+=(e.clientX-px)*0.006; pitch+=(e.clientY-py)*0.006;
  pitch=Math.max(-1.4,Math.min(1.4,pitch)); px=e.clientX; py=e.clientY; });
addEventListener('pointerup',()=>dragging=false);
cvs.addEventListener('wheel',e=>{ if(renderer.xr.isPresenting)return; dist=Math.max(0.2,Math.min(10,dist+e.deltaY*0.003)); },{passive:true});

// ---- controls ----
const $=id=>document.getElementById(id);
function bind(id,vid,fn,fmt){ const el=$(id); el.addEventListener('input',()=>{ const v=parseFloat(el.value); $(vid).textContent=fmt?fmt(v):v; fn(v); }); }
bind('feed','feedv',v=>{FEED=v;}, v=>v.toFixed(3));
bind('kill','killv',v=>{KILL=v;}, v=>v.toFixed(3));
bind('comp','compv',v=>{compStrength=v; recomputeLayers();}, v=>v.toFixed(2));
bind('exp','expv',v=>{expandRate=v;}, v=>v.toFixed(3));
bind('rate','ratev',v=>{RATE=v|0;}, v=>String(v|0));
$('seed').onclick=reseed;
let expandRate=0.006;

// ---- WebXR ----
let xrSession=null; const vrBtn=$('vr');
if(navigator.xr){ navigator.xr.isSessionSupported('immersive-vr').then(ok=>{ if(!ok) vrBtn.textContent='VR not available'; }); }
else vrBtn.textContent='No WebXR';
vrBtn.onclick=async()=>{
  if(xrSession){ xrSession.end(); return; }
  try{
    const session=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']});
    renderer.xr.setReferenceSpaceType('local-floor'); await renderer.xr.setSession(session);
    xrSession=session; vrBtn.textContent='Exit VR'; placeVR();
    session.addEventListener('end',()=>{ xrSession=null; vrBtn.textContent='Enter VR'; placeDesktop(); });
  }catch(e){ vrBtn.textContent='VR failed'; }
};

// optional: VR thumbstick (Y) inflates / shrinks the cell from the inside
function vrStick(){
  if(!renderer.xr.isPresenting||!xrSession) return;
  try{ for(const src of xrSession.inputSources){ const gp=src.gamepad; if(gp&&gp.axes&&gp.axes.length>=4){
    const y=gp.axes[3]; if(Math.abs(y)>0.15){ Rscale=Math.min(9,Math.max(0.4,Rscale - y*0.04)); } } } }catch(e){}
}

// ---- loop ----
const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta();
  stepRD();
  if(expandRate>0) Rscale=Math.min(9,Rscale+expandRate);   // boundary inflates over time
  vrStick();
  cellGroup.scale.setScalar(placeScale*Rscale);
  if(!renderer.xr.isPresenting){
    const cp=Math.cos(pitch);
    camera.position.set(Math.sin(yaw)*cp*dist, Math.sin(pitch)*dist, Math.cos(yaw)*cp*dist);
    camera.lookAt(0,0,0);
  }
  cellGroup.rotation.y += dt*0.04;
  renderer.render(scene,camera);
});

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); mat.uniforms.uFocal.value=innerHeight*Math.min(2,devicePixelRatio)*0.55; });
</script>
</body>
</html>
