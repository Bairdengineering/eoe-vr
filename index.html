<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EoE — Breathing Reef (WebXR)</title>
<style>
  html,body{margin:0;height:100%;background:#0a0d14;overflow:hidden;font-family:system-ui,sans-serif;color:#9fb3d6}
  #hud{position:fixed;left:12px;top:12px;font-size:12px;line-height:1.5;opacity:.8;pointer-events:none}
  #hud b{color:#ecb74e}
</style>
</head>
<body>
<div id="hud">EoE — Breathing Reef<br>living <b style="color:#7fb27f">green</b> · husk <b>gold</b> · drag to orbit (desktop) · Enter VR to stand inside</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================================
// CONFIG  — the verified breathing-reef dynamics (ported line-for-line from
// breathe_reef.py). Each cell runs the verified breath (fast a, slow reserve W)
// driven by a SHARED throughput pool T that is sourced at the surface, diffuses
// inward, and is consumed by living activity. That shared pool is the coupling
// that makes the whole reef pulse as one. Husk accumulates on every down-stroke.
// ============================================================================
const CFG = {
  subdiv: 2, nShells: 10, r0: 0.40, r1: 1.0, k: 14,   // mesh (1620 pts, matches verified run)
  dt: 0.04, tau: 1.0, eps: 0.08,                       // breath timescales
  I0: 0.25, gI: 0.9,                                   // throughput -> breath drive
  S: 0.9, Ddiff: 0.45, cons: 0.7, Th: 0.25,            // source / diffusion / consumption
  hk: 0.020,                                           // husk deposition rate on the down-stroke
  stepsPerFrame: 2,                                    // sim speed (≈6s per pulse at 72fps)
  worldScale: 2.3, headHeight: 1.5,                    // place it around your head -> stand inside
  pointPx: 5.0, pointPxMin: 2.0, pointPxMax: 22.0      // CLAMPED point size (VR fix)
  // KNOB: lower Ddiff (e.g. 0.12) -> the synchronized pulse becomes a wave that climbs the shells.
};

// ---------- geodesic icosphere (ported from eoe_radial.icosphere) ----------
const norm3 = v => { const m = Math.hypot(v[0],v[1],v[2]); return [v[0]/m,v[1]/m,v[2]/m]; };
function icosphere(subdiv){
  const t=(1+Math.sqrt(5))/2;
  let V=[[-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],[0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],[t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1]].map(norm3);
  let F=[[0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],[1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],[3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],[4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]];
  const cache=new Map();
  const mid=(a,b)=>{ const key=a<b?a+'_'+b:b+'_'+a; if(cache.has(key))return cache.get(key);
    const m=norm3([(V[a][0]+V[b][0])/2,(V[a][1]+V[b][1])/2,(V[a][2]+V[b][2])/2]); V.push(m); cache.set(key,V.length-1); return V.length-1; };
  for(let s=0;s<subdiv;s++){ const nf=[]; for(const [a,b,c] of F){ const ab=mid(a,b),bc=mid(b,c),ca=mid(c,a); nf.push([a,ab,ca],[b,bc,ab],[c,ca,bc],[ab,bc,ca]); } F=nf; }
  return V;
}

// ---------- build concentric shells ----------
const unit = icosphere(CFG.subdiv);
const radii = Array.from({length:CFG.nShells}, (_,i)=> CFG.r0 + (CFG.r1-CFG.r0)*i/(CFG.nShells-1));
const N = unit.length * CFG.nShells;
const pos = new Float32Array(N*3);
const shell = new Int16Array(N);
let p=0;
for(let s=0;s<CFG.nShells;s++){ const r=radii[s];
  for(let v=0; v<unit.length; v++){ pos[p*3]=unit[v][0]*r; pos[p*3+1]=unit[v][1]*r; pos[p*3+2]=unit[v][2]*r; shell[p]=s; p++; } }
const surf = new Uint8Array(N);
for(let i=0;i<N;i++) surf[i] = (shell[i]===CFG.nShells-1)?1:0;

// ---------- k-nearest neighbours (brute force, once) ----------
const K=CFG.k; const nb = new Int32Array(N*K);
(function buildKNN(){
  const idx=new Int32Array(N), d=new Float32Array(N);
  for(let i=0;i<N;i++){ const xi=pos[i*3],yi=pos[i*3+1],zi=pos[i*3+2];
    for(let j=0;j<N;j++){ const dx=pos[j*3]-xi,dy=pos[j*3+1]-yi,dz=pos[j*3+2]-zi; d[j]=dx*dx+dy*dy+dz*dz; idx[j]=j; }
    // partial selection of K+1 smallest (skip self at distance 0)
    for(let a=0;a<=K;a++){ let m=a; for(let b=a+1;b<N;b++) if(d[idx[b]]<d[idx[m]]) m=b; const tmp=idx[a]; idx[a]=idx[m]; idx[m]=tmp; }
    for(let a=0;a<K;a++) nb[i*K+a]=idx[a+1]; // a+1 skips self
  }
})();

// ---------- fields ----------
const a = new Float32Array(N), W = new Float32Array(N), T = new Float32Array(N), h = new Float32Array(N), Tavg = new Float32Array(N);
for(let i=0;i<N;i++){ a[i]=0.1*(Math.random()*2-1); T[i]=0.5; }
let huskMax=1e-6;

function simStep(){
  const {dt,tau,eps,I0,gI,S,Ddiff,cons,Th,hk}=CFG;
  // throughput: diffuse (neighbour mean), source at surface, consume
  for(let i=0;i<N;i++){ let sT=0; const base=i*K; for(let a2=0;a2<K;a2++) sT+=T[nb[base+a2]]; Tavg[i]=sT/K; }
  for(let i=0;i<N;i++){
    T[i]+= Ddiff*(Tavg[i]-T[i]);
    if(surf[i]) T[i]+= S*dt;
    const upt = cons*Math.max(a[i],0)*T[i]/(T[i]+Th);
    T[i]=Math.max(T[i]-upt*dt,1e-5);
  }
  // the verified breath, per cell  +  husk on the down-stroke
  let hm=huskMax;
  for(let i=0;i<N;i++){
    const Ii = I0 + gI*T[i];
    const ai = a[i];
    const da = (ai - ai*ai*ai/3.0 - W[i] + Ii)/tau;
    const dW = eps*(ai + 0.7 - 0.8*W[i]);
    const an = ai + dt*da;
    if(da<0 && ai>0){ h[i]+= hk*dt*ai; if(h[i]>hm) hm=h[i]; }
    W[i]+= dt*dW;
    a[i]=an;
  }
  huskMax = Math.max(hm, 1e-6);
}

// ---------- three.js scene ----------
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x0a0d14, 1);
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, CFG.headHeight, CFG.worldScale*1.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, CFG.headHeight, 0);
controls.enableDamping = true;

// geometry + custom shader (clamped point size, additive alpha, per-point colour)
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
const col = new Float32Array(N*3); const psize = new Float32Array(N);
geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
geo.setAttribute('psize', new THREE.BufferAttribute(psize, 1));

const mat = new THREE.ShaderMaterial({
  uniforms:{ uPx:{value:CFG.pointPx}, uMin:{value:CFG.pointPxMin}, uMax:{value:CFG.pointPxMax} },
  vertexShader:`
    attribute vec3 color; attribute float psize; varying vec3 vColor;
    uniform float uPx, uMin, uMax;
    void main(){ vColor=color; vec4 mv=modelViewMatrix*vec4(position,1.0);
      float s = uPx*psize*(1.0/ -mv.z);
      gl_PointSize = clamp(s, uMin, uMax);              // CLAMPED point size (VR fix)
      gl_Position = projectionMatrix*mv; }`,
  fragmentShader:`
    varying vec3 vColor;
    void main(){ vec2 d=gl_PointCoord-vec2(0.5); float r=length(d); if(r>0.5) discard;
      float al=smoothstep(0.5,0.0,r);
      gl_FragColor=vec4(vColor, al); }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending   // additive alpha (VR fix)
});
const points = new THREE.Points(geo, mat);
points.scale.setScalar(CFG.worldScale);
points.position.set(0, CFG.headHeight, 0);   // centred on your head -> stand inside
scene.add(points);

function updateColors(){
  const inv = 1.0/(huskMax);
  for(let i=0;i<N;i++){
    const liv = Math.min(Math.max(a[i]*0.5,0),1);
    const hus = Math.min(h[i]*inv,1);
    const b0=0.04;
    col[i*3]   = b0 + 0.10*liv + 0.95*hus;   // R
    col[i*3+1] = b0 + 0.95*liv + 0.62*hus;   // G
    col[i*3+2] = b0 + 0.55*liv + 0.18*hus;   // B
    psize[i]   = 0.45 + 1.4*liv + 0.5*hus;
  }
  geo.attributes.color.needsUpdate = true;
  geo.attributes.psize.needsUpdate = true;
}

addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

renderer.setAnimationLoop(()=>{
  for(let s=0;s<CFG.stepsPerFrame;s++) simStep();
  updateColors();
  if(!renderer.xr.isPresenting){ points.rotation.y += 0.0015; controls.update(); }  // no auto-rotate in VR
  renderer.render(scene, camera);
});
</script>
</body>
</html>
